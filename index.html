<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión POS</title>
    <style>
        /* --- ESTILOS BASE Y CORRECCIONES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f6f9;
            color: #333;
        }

        /* Punto 6: Pantalla de Login */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .login-overlay.hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }
        .login-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo {
            max-width: 80px;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-login-submit {
            width: 100%;
            padding: 0.75rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login-submit:hover {
            background: #0056b3;
        }
        .error-msg {
            color: #dc3545;
            background: #f8d7da;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .hidden { display: none; }

        /* Punto 5: Wrapper e Interfaz General */
        .main-container { padding: 2rem; }
        .dtable-wrap {
            width: 100%;
            overflow-x: auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-top: 1rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .data-table th, .data-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        .data-table th { background: #f8f9fa; font-weight: 600; }

        /* Grid de Menú */
        #items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .grid-item-btn {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100px;
            transition: all 0.2s;
        }
        .grid-item-btn:hover {
            border-color: #007bff;
            background: #f0f7ff;
        }
        .item-name { font-weight: bold; font-size: 1rem; }
        .item-price { color: #28a745; margin-top: 0.5rem; }

        /* Modales */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
        }
        .modal.active { display: block; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <div class="login-header">
                <h2>Acceso al Sistema</h2>
                <p>Introduce tus credenciales para continuar</p>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-username">Usuario</label>
                    <input type="text" id="login-username" required placeholder="Ej. admin">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <div id="login-error-msg" class="error-msg hidden">
                    Credenciales incorrectas. Intente de nuevo.
                </div>
                <button type="submit" class="btn-login-submit">Ingresar</button>
            </form>
        </div>
    </div>

    <div class="main-container">
        <h1>Panel de Control del Restaurante</h1>
        
        <button id="open-menu-btn" onclick="openMenu()">Gestionar Menú / Orden</button>
        
        <hr>

        <h3>Categorías</h3>
        <button onclick="switchMCat('entradas')">Entradas</button>
        <button onclick="switchMCat('fuertes')">Platos Fuertes</button>
        <button onclick="switchMCat('bebidas')">Bebidas</button>

        <div id="items-grid"></div>

        <hr>

        <h3>Cola de Impresión</h3>
        <div id="print-queue-container"></div>
    </div>

    <div id="menu-modal" class="modal">
        <h3>Propiedades del Menú</h3>
        <p>Ajustes rápidos y sincronización activa.</p>
        <button id="save-menu-btn">Guardar Cambios de Orden</button>
        <button onclick="document.getElementById('menu-modal').classList.remove('active')">Cerrar</button>
    </div>

    <script>
        // ==========================================
        // PUNTO 2: CONFIGURACIÓN INICIAL DEL SISTEMA
        // ==========================================
        const DEFAULT_FB_CONFIG = {
            apiKey: "AIzaSyAsYourRealKeyHere_123456",
            authDomain: "the-family-pos.firebaseapp.com",
            databaseURL: "https://the-family-pos-default-rtdb.firebaseio.com",
            projectId: "the-family-pos",
            storageBucket: "the-family-pos.appspot.com",
            messagingSenderId: "9876543210",
            appId: "1:9876543210:web:abcdef123456"
        };

        // Estado de la aplicación
        let appState = {
            isAuthenticated: false,
            currentCategory: 'entradas'
        };

        let menuAbortController = null;

        // Base de datos dummy local para renderizado inmediato si Firebase tarda
        const mockDb = {
            entradas: [
                { id: 'e1', name: 'Pechuga a la Plancha (Entrada)', price: 250 },
                { id: 'e2', name: 'Bastones de Mozzarella', price: 180 }
            ],
            fuertes: [
                { id: 'f1', name: 'Pechuga a la Plancha', price: 450 },
                { id: 'f2', name: 'Mofongo de Filete', price: 600 }
            ],
            bebidas: [
                { id: 'b1', name: 'Jugo Natural', price: 120 },
                { id: 'b2', name: 'Refresco Familiar', price: 150 }
            ]
        };

        // ==========================================
        // MANEJO DE AUTENTICACIÓN (PUNTO 6)
        // ==========================================
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error-msg');

            // Autenticación básica de muestra
            if (user === 'admin' && pass === '1234') {
                appState.isAuthenticated = true;
                errorMsg.classList.add('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                
                // Inicializar listeners una vez autenticado
                initApp();
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        // ==========================================
        // PUNTO 1: CONFIGURACIÓN Y LISTENERS FIREBASE
        // ==========================================
        function saveFBConfig(config) {
            console.log("Guardando nueva configuración de Firebase...", config);
            localStorage.setItem('fb_custom_config', JSON.stringify(config));
        }

        function resetFBConfig() {
            console.log("Restableciendo a la configuración por defecto.");
            localStorage.removeItem('fb_custom_config');
            // Usar de forma segura DEFAULT_FB_CONFIG debido a que está declarada arriba
            initializeFirebase(DEFAULT_FB_CONFIG);
        }

        function initializeFirebase(config) {
            if (!firebase.apps.length) {
                firebase.initializeApp(config);
            }
            initFBListeners();
        }

        // PUNTO 1: El bloque huérfano encapsulado correctamente
        function initFBListeners() {
            if (!firebase.apps.length) return;

            const db = firebase.database();

            // Sincronización en tiempo real de la cola de impresión
            db.ref('print_queue').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const formatData = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                    renderPrintQueue(formatData);
                }
            });

            db.ref('.info/connected').on('value', (snapshot) => {
                if (snapshot.val() === true) {
                    console.log("Conectado nativamente a Firebase Realtime Database.");
                } else {
                    console.warn("Buscando señal o desconectado de Firebase.");
                }
            });
        }

        // ==========================================
        // PUNTO 3: PREVENIR DUPLICADOS EN OPENMENU
        // ==========================================
        function openMenu() {
            // Abortar listeners del ciclo anterior para que no acumule duplicados
            if (menuAbortController) {
                menuAbortController.abort();
            }
            
            // Generar un nuevo controlador limpio para esta apertura
            menuAbortController = new AbortController();
            const { signal } = menuAbortController;

            const saveMenuBtn = document.getElementById('save-menu-btn');

            // Listener controlado y auto-limpiable
            saveMenuBtn.addEventListener('click', () => {
                console.log("Acción ejecutada una sola vez por interacción del modal.");
                alert("¡Orden procesada sin duplicados!");
                document.getElementById('menu-modal').classList.remove('active');
            }, { signal });

            document.getElementById('menu-modal').classList.add('active');
        }

        // ==========================================
        // PUNTO 4: DELEGACIÓN DE EVENTOS EN EL GRID
        // ==========================================
        function initGridMenuListener() {
            const itemsGrid = document.getElementById('items-grid');
            if (!itemsGrid) return;

            // Escuchamos directamente en el padre. Los re-renders dinámicos no rompen el listener
            itemsGrid.addEventListener('click', function(e) {
                const targetItem = e.target.closest('.grid-item-btn');
                if (targetItem) {
                    const itemId = targetItem.dataset.id;
                    const itemPrice = targetItem.dataset.price;
                    const itemName = targetItem.querySelector('.item-name').innerText;
                    
                    addItemToOrder(itemId, itemName, itemPrice);
                }
            });
        }

        function switchMCat(category) {
            appState.currentCategory = category;
            renderMItems(mockDb[category]);
        }

        function renderMItems(items) {
            const itemsGrid = document.getElementById('items-grid');
            // Inyectamos sólo strings puros de HTML. No atamos eventos individuales aquí
            itemsGrid.innerHTML = items.map(item => `
                <button class="grid-item-btn" data-id="${item.id}" data-price="${item.price}">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">$${item.price}</span>
                </button>
            `).join('');
        }

        function addItemToOrder(id, name, price) {
            console.log(`Ítem agregado: ${name} (ID: ${id}) - $${price}`);
        }

        // ==========================================
        // PUNTO 5: RENDER DE COLA CON EL WRAPPER CORRECTO
        // ==========================================
        function renderPrintQueue(queueData) {
            const container = document.getElementById('print-queue-container');
            if (!container) return;

            // Integración estricta de la estructura estructural dtable-wrap
            container.innerHTML = `
                <div class="dtable-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID Pedido</th>
                                <th>Hora</th>
                                <th>Destino</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${queueData.map(item => `
                                <tr>
                                    <td>#${item.id}</td>
                                    <td>${item.time || 'Ahora'}</td>
                                    <td>${item.destination || 'Cocina'}</td>
                                    <td><span style="color: green; font-weight: bold;">${item.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ==========================================
        // INICIALIZACIÓN DE APLICACIÓN
        // ==========================================
        function initApp() {
            // Inicializar listener estático del Grid de productos
            initGridMenuListener();
            
            // Cargar datos por defecto de la primera categoría
            switchMCat('entradas');

            // Renderizar datos de prueba en la cola de impresión por si Firebase no está activo
            renderPrintQueue([
                { id: '1024', time: '21:40', destination: 'Cocina', status: 'En espera' },
                { id: '1025', time: '21:45', destination: 'Barra', status: 'Imprimiendo' }
            ]);

            // Inicializar la conexión Firebase
            const savedConfig = localStorage.getItem('fb_custom_config');
            initializeFirebase(savedConfig ? JSON.parse(savedConfig) : DEFAULT_FB_CONFIG);
        }
    </script>
</body>
</html>
